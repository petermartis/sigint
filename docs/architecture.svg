<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#22c55e"/><stop offset="100%" stop-color="#059669"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#0891b2"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="520" rx="16" fill="#06060a"/>
  <rect x="1" y="1" width="958" height="518" rx="15" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#f0f0f5" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="-0.02em">System Architecture</text>
  <text x="480" y="54" text-anchor="middle" fill="#707088" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">Three coordinated services on Raspberry Pi</text>

  <!-- ═══ Layer 1: Hardware ═══ -->
  <rect x="40" y="80" width="140" height="90" rx="10" fill="#0c0c14" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="110" y="108" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="11" font-weight="700">RTL-SDR</text>
  <text x="110" y="124" text-anchor="middle" fill="#707088" font-family="Inter, system-ui, sans-serif" font-size="9">RTL2832U + R820T2</text>
  <text x="110" y="140" text-anchor="middle" fill="#484860" font-family="monospace" font-size="9">24 MHz – 1.766 GHz</text>
  <text x="110" y="156" text-anchor="middle" fill="#484860" font-family="monospace" font-size="9">8-bit · 2 MS/s</text>

  <!-- Antenna icon -->
  <line x1="110" y1="75" x2="110" y2="80" stroke="#22c55e" stroke-width="2"/>
  <line x1="100" y1="70" x2="110" y2="80" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="120" y1="70" x2="110" y2="80" stroke="#22c55e" stroke-width="1.5"/>

  <!-- Arrow: RTL-SDR → GNU Radio -->
  <line x1="180" y1="125" x2="230" y2="125" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="228,121 236,125 228,129" fill="#22c55e"/>
  <text x="208" y="118" text-anchor="middle" fill="#484860" font-family="monospace" font-size="8">USB</text>

  <!-- ═══ Layer 2: GNU Radio (tetra-sdr) ═══ -->
  <rect x="236" y="74" width="220" height="340" rx="12" fill="#0c0c14" stroke="url(#g1)" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="236" y="74" width="220" height="28" rx="12" fill="rgba(34,197,94,0.08)"/>
  <rect x="236" y="90" width="220" height="12" rx="0" fill="rgba(34,197,94,0.08)"/>
  <text x="346" y="93" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">tetra-sdr</text>

  <!-- LPF -->
  <rect x="260" y="116" width="170" height="36" rx="6" fill="#12121e" stroke="rgba(255,255,255,0.06)"/>
  <text x="345" y="130" text-anchor="middle" fill="#b0b0c0" font-family="monospace" font-size="9" font-weight="600">freq_xlating_fir_filter</text>
  <text x="345" y="143" text-anchor="middle" fill="#484860" font-family="monospace" font-size="8">2 MS/s → 36 kHz</text>

  <!-- Demodulators -->
  <rect x="260" y="164" width="170" height="80" rx="6" fill="#12121e" stroke="rgba(255,255,255,0.06)"/>
  <text x="345" y="180" text-anchor="middle" fill="#06b6d4" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">Demodulators</text>
  <text x="345" y="195" text-anchor="middle" fill="#707088" font-family="monospace" font-size="8">TETRA π/4-DQPSK  ·  DMR 4FSK</text>
  <text x="345" y="208" text-anchor="middle" fill="#707088" font-family="monospace" font-size="8">P25 C4FM  ·  NXDN  ·  dPMR</text>
  <text x="345" y="221" text-anchor="middle" fill="#707088" font-family="monospace" font-size="8">Analog FM  ·  Analog AM</text>
  <text x="345" y="237" text-anchor="middle" fill="#484860" font-family="monospace" font-size="8">runtime hot-swap via lock/unlock</text>

  <!-- Audio path -->
  <rect x="260" y="256" width="170" height="30" rx="6" fill="#12121e" stroke="rgba(255,255,255,0.06)"/>
  <text x="345" y="271" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="9" font-weight="600">Audio: 36k→16k PCM</text>
  <text x="345" y="281" text-anchor="middle" fill="#484860" font-family="monospace" font-size="8">resample · gain 8000 · Int16</text>

  <!-- FFT -->
  <rect x="260" y="298" width="170" height="30" rx="6" fill="#12121e" stroke="rgba(255,255,255,0.06)"/>
  <text x="345" y="313" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="9" font-weight="600">FFT Probe → numpy</text>
  <text x="345" y="323" text-anchor="middle" fill="#484860" font-family="monospace" font-size="8">256-pt · Hamming · 15 fps</text>

  <!-- XML-RPC -->
  <rect x="260" y="340" width="170" height="28" rx="6" fill="#12121e" stroke="rgba(255,255,255,0.06)"/>
  <text x="345" y="358" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="9" font-weight="600">XML-RPC :42001</text>
  <text x="345" y="370" text-anchor="middle" fill="#484860" font-family="monospace" font-size="8">freq · gain · ppm · mode · level</text>

  <!-- Signal level -->
  <rect x="260" y="380" width="170" height="22" rx="6" fill="#12121e" stroke="rgba(255,255,255,0.06)"/>
  <text x="345" y="395" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="8" font-weight="600">get_signal_level() → Scanner</text>

  <!-- ═══ Layer 3: Decoder ═══ -->
  <rect x="236" y="420" width="220" height="44" rx="10" fill="#0c0c14" stroke="url(#g3)" stroke-width="1" stroke-opacity="0.4"/>
  <text x="346" y="440" text-anchor="middle" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">tetra-decoder</text>
  <text x="346" y="455" text-anchor="middle" fill="#707088" font-family="monospace" font-size="9">tetra-kit · L2/L3 · SDS · voice</text>

  <!-- UDP arrows from GR -->
  <!-- Symbols to decoder -->
  <line x1="346" y1="414" x2="346" y2="420" stroke="#f59e0b" stroke-width="1.5"/>
  <polygon points="343,418 346,424 349,418" fill="#f59e0b"/>
  <text x="380" y="416" fill="#484860" font-family="monospace" font-size="7">UDP :42000</text>

  <!-- ═══ Layer 4: API Server ═══ -->
  <rect x="510" y="74" width="220" height="390" rx="12" fill="#0c0c14" stroke="url(#g2)" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="510" y="74" width="220" height="28" rx="12" fill="rgba(59,130,246,0.08)"/>
  <rect x="510" y="90" width="220" height="12" rx="0" fill="rgba(59,130,246,0.08)"/>
  <text x="620" y="93" text-anchor="middle" fill="#3b82f6" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">tetra-api</text>

  <!-- REST API -->
  <rect x="534" y="116" width="170" height="50" rx="6" fill="#12121e" stroke="rgba(255,255,255,0.06)"/>
  <text x="619" y="132" text-anchor="middle" fill="#b0b0c0" font-family="monospace" font-size="9" font-weight="600">FastAPI REST</text>
  <text x="619" y="146" text-anchor="middle" fill="#484860" font-family="monospace" font-size="8">/api/radio · /api/tune · /api/mode</text>
  <text x="619" y="158" text-anchor="middle" fill="#484860" font-family="monospace" font-size="8">/api/events · /api/calls · /api/sds</text>

  <!-- Scan Engine -->
  <rect x="534" y="178" width="170" height="50" rx="6" fill="rgba(245,158,11,0.05)" stroke="rgba(245,158,11,0.2)"/>
  <text x="619" y="194" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="9" font-weight="600">Scan Engine</text>
  <text x="619" y="207" text-anchor="middle" fill="#707088" font-family="monospace" font-size="8">/api/scan/* · async loop</text>
  <text x="619" y="219" text-anchor="middle" fill="#484860" font-family="monospace" font-size="8">squelch · dwell · channel list</text>

  <!-- WebSocket -->
  <rect x="534" y="240" width="170" height="50" rx="6" fill="#12121e" stroke="rgba(255,255,255,0.06)"/>
  <text x="619" y="256" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="9" font-weight="600">WebSocket Streams</text>
  <text x="619" y="269" text-anchor="middle" fill="#484860" font-family="monospace" font-size="8">/ws · /ws/audio · /ws/fft</text>
  <text x="619" y="282" text-anchor="middle" fill="#484860" font-family="monospace" font-size="8">events + scan state broadcasts</text>

  <!-- SQLite -->
  <rect x="534" y="302" width="170" height="36" rx="6" fill="#12121e" stroke="rgba(255,255,255,0.06)"/>
  <text x="619" y="318" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="9" font-weight="600">SQLite + aiosqlite</text>
  <text x="619" y="331" text-anchor="middle" fill="#484860" font-family="monospace" font-size="8">events · calls · sds_messages</text>

  <!-- Ingestor -->
  <rect x="534" y="350" width="170" height="36" rx="6" fill="#12121e" stroke="rgba(255,255,255,0.06)"/>
  <text x="619" y="366" text-anchor="middle" fill="#b0b0c0" font-family="monospace" font-size="9" font-weight="600">UDP Ingestor</text>
  <text x="619" y="379" text-anchor="middle" fill="#484860" font-family="monospace" font-size="8">JSON · Audio · FFT listeners</text>

  <!-- Channel list file -->
  <rect x="534" y="398" width="170" height="28" rx="6" fill="#12121e" stroke="rgba(255,255,255,0.06)"/>
  <text x="619" y="416" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="8" font-weight="600">scan-list.json · persist</text>

  <!-- Static files -->
  <rect x="534" y="434" width="170" height="22" rx="6" fill="#12121e" stroke="rgba(255,255,255,0.06)"/>
  <text x="619" y="449" text-anchor="middle" fill="#707088" font-family="monospace" font-size="8">Static: index.html · port 80</text>

  <!-- UDP arrows: GR → API -->
  <line x1="456" y1="270" x2="534" y2="270" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 3"/>
  <polygon points="530,267 538,270 530,273" fill="#f59e0b"/>
  <text x="495" y="264" text-anchor="middle" fill="#484860" font-family="monospace" font-size="7">:42002</text>
  <text x="495" y="278" text-anchor="middle" fill="#484860" font-family="monospace" font-size="7">Audio</text>

  <line x1="456" y1="310" x2="534" y2="370" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="485" y="332" text-anchor="middle" fill="#484860" font-family="monospace" font-size="7">:42003 FFT</text>

  <!-- Decoder → API -->
  <line x1="456" y1="442" x2="534" y2="370" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="485" y="416" text-anchor="middle" fill="#484860" font-family="monospace" font-size="7">:42100 JSON</text>

  <!-- XML-RPC arrow: API → GR -->
  <line x1="534" y1="200" x2="456" y2="356" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="485" y="285" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="7">XML-RPC</text>

  <!-- ═══ Layer 5: Browser ═══ -->
  <rect x="784" y="100" width="140" height="320" rx="12" fill="#0c0c14" stroke="url(#g5)" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="784" y="100" width="140" height="28" rx="12" fill="rgba(6,182,212,0.08)"/>
  <rect x="784" y="116" width="140" height="12" rx="0" fill="rgba(6,182,212,0.08)"/>
  <text x="854" y="119" text-anchor="middle" fill="#06b6d4" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">Browser</text>

  <rect x="800" y="142" width="108" height="22" rx="4" fill="#12121e" stroke="rgba(255,255,255,0.06)"/>
  <text x="854" y="157" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="8" font-weight="600">Spectrum + Waterfall</text>

  <rect x="800" y="172" width="108" height="22" rx="4" fill="#12121e" stroke="rgba(255,255,255,0.06)"/>
  <text x="854" y="187" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="8" font-weight="600">Event Stream</text>

  <rect x="800" y="202" width="108" height="22" rx="4" fill="#12121e" stroke="rgba(255,255,255,0.06)"/>
  <text x="854" y="217" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="8" font-weight="600">Scanner Controls</text>

  <rect x="800" y="232" width="108" height="22" rx="4" fill="#12121e" stroke="rgba(255,255,255,0.06)"/>
  <text x="854" y="247" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="8" font-weight="600">Active Calls</text>

  <rect x="800" y="262" width="108" height="22" rx="4" fill="#12121e" stroke="rgba(255,255,255,0.06)"/>
  <text x="854" y="277" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="8" font-weight="600">SDS Messages</text>

  <rect x="800" y="292" width="108" height="22" rx="4" fill="#12121e" stroke="rgba(255,255,255,0.06)"/>
  <text x="854" y="307" text-anchor="middle" fill="#b0b0c0" font-family="monospace" font-size="8" font-weight="600">Audio Monitor</text>

  <rect x="800" y="322" width="108" height="22" rx="4" fill="#12121e" stroke="rgba(255,255,255,0.06)"/>
  <text x="854" y="337" text-anchor="middle" fill="#707088" font-family="monospace" font-size="8" font-weight="600">Recordings</text>

  <rect x="800" y="352" width="108" height="22" rx="4" fill="#12121e" stroke="rgba(255,255,255,0.06)"/>
  <text x="854" y="367" text-anchor="middle" fill="#707088" font-family="monospace" font-size="8" font-weight="600">Settings Panel</text>

  <rect x="800" y="382" width="108" height="22" rx="4" fill="#12121e" stroke="rgba(255,255,255,0.06)"/>
  <text x="854" y="397" text-anchor="middle" fill="#484860" font-family="monospace" font-size="8">Single-file SPA</text>

  <!-- Arrows: API → Browser -->
  <line x1="730" y1="160" x2="784" y2="160" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="780,157 788,160 780,163" fill="#06b6d4"/>
  <text x="757" y="153" text-anchor="middle" fill="#484860" font-family="monospace" font-size="7">WS</text>

  <line x1="730" y1="260" x2="784" y2="260" stroke="#06b6d4" stroke-width="1.5"/>
  <polygon points="780,257 788,260 780,263" fill="#06b6d4"/>
  <text x="757" y="253" text-anchor="middle" fill="#484860" font-family="monospace" font-size="7">REST</text>

  <!-- Port labels at bottom -->
  <rect x="40" y="484" width="880" height="24" rx="4" fill="rgba(255,255,255,0.02)"/>
  <text x="480" y="500" text-anchor="middle" fill="#484860" font-family="monospace" font-size="9">
    UDP :42000 symbols · :42001 XML-RPC · :42002 audio · :42003 FFT · :42100 JSON frames · TCP :80 HTTP/WS
  </text>
</svg>
