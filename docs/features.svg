  <text x="756" y="146" text-anchor="middle" fill="#707088" font-family="monospace" font-size="7">CTCSS / DCS</text>
  <text x="756" y="160" text-anchor="middle" fill="#707088" font-family="monospace" font-size="7">direct audio out</text>
  <text x="756" y="174" text-anchor="middle" fill="#484860" font-family="monospace" font-size="7">16 kHz PCM</text>
  <rect x="706" y="186" width="100" height="14" rx="3" fill="rgba(244,63,94,0.08)"/>
  <text x="756" y="196" text-anchor="middle" fill="#f43f5e" font-family="monospace" font-size="7" font-weight="600">Full audio</text>

  <!-- Analog AM -->
  <rect x="828" y="70" width="108" height="140" rx="10" fill="#0c0c14" stroke="rgba(176,176,192,0.2)"/>
  <rect x="828" y="70" width="108" height="32" rx="10" fill="rgba(176,176,192,0.04)"/>
  <rect x="828" y="90" width="108" height="12" fill="rgba(176,176,192,0.04)"/>
  <circle cx="852" cy="86" r="8" fill="rgba(176,176,192,0.1)" stroke="#b0b0c0" stroke-width="1"/>
  <text x="852" y="90" text-anchor="middle" fill="#b0b0c0" font-family="monospace" font-size="7" font-weight="700">AM</text>
  <text x="876" y="90" fill="#b0b0c0" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">Analog AM</text>
  <text x="882" y="118" text-anchor="middle" fill="#b0b0c0" font-family="monospace" font-size="8">Envelope det.</text>
  <text x="882" y="132" text-anchor="middle" fill="#707088" font-family="monospace" font-size="7">Airband / HF</text>
  <text x="882" y="146" text-anchor="middle" fill="#707088" font-family="monospace" font-size="7">direct audio out</text>
  <text x="882" y="160" text-anchor="middle" fill="#707088" font-family="monospace" font-size="7">16 kHz PCM</text>
  <text x="882" y="174" text-anchor="middle" fill="#484860" font-family="monospace" font-size="7">wideband capable</text>
  <rect x="840" y="186" width="84" height="14" rx="3" fill="rgba(176,176,192,0.06)"/>
  <text x="882" y="196" text-anchor="middle" fill="#b0b0c0" font-family="monospace" font-size="7" font-weight="600">Full audio</text>

  <!-- ═══ Capability Cards Row ═══ -->

  <!-- Scanner -->
  <rect x="24" y="228" width="224" height="80" rx="10" fill="#0c0c14" stroke="rgba(245,158,11,0.3)"/>
  <rect x="24" y="228" width="224" height="28" rx="10" fill="rgba(245,158,11,0.06)"/>
  <rect x="24" y="244" width="224" height="12" fill="rgba(245,158,11,0.06)"/>
  <text x="44" y="247" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">⟳ Frequency Scanner</text>
  <text x="44" y="270" fill="#b0b0c0" font-family="monospace" font-size="8">Async scan engine with configurable channel list</text>
  <text x="44" y="284" fill="#707088" font-family="monospace" font-size="8">Squelch-based lock · dwell timer · skip</text>
  <text x="44" y="298" fill="#484860" font-family="monospace" font-size="8">Quick-save channels · JSON persist · WS broadcast</text>

  <!-- Spectrum -->
  <rect x="260" y="228" width="224" height="80" rx="10" fill="#0c0c14" stroke="rgba(34,197,94,0.3)"/>
  <rect x="260" y="228" width="224" height="28" rx="10" fill="rgba(34,197,94,0.06)"/>
  <rect x="260" y="244" width="224" height="12" fill="rgba(34,197,94,0.06)"/>
  <text x="280" y="247" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">📊 Live Spectrum &amp; Waterfall</text>
  <text x="280" y="270" fill="#b0b0c0" font-family="monospace" font-size="8">256-pt FFT · Hamming window · 15 fps</text>
  <text x="280" y="284" fill="#707088" font-family="monospace" font-size="8">Canvas-based spectrum + scrolling waterfall</text>
  <text x="280" y="298" fill="#484860" font-family="monospace" font-size="8">Real-time via WebSocket binary frames</text>

  <!-- Audio -->
  <rect x="496" y="228" width="224" height="80" rx="10" fill="#0c0c14" stroke="rgba(6,182,212,0.3)"/>
  <rect x="496" y="228" width="224" height="28" rx="10" fill="rgba(6,182,212,0.06)"/>
  <rect x="496" y="244" width="224" height="12" fill="rgba(6,182,212,0.06)"/>
  <text x="516" y="247" fill="#06b6d4" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">🔊 In-Browser Audio</text>
  <text x="516" y="270" fill="#b0b0c0" font-family="monospace" font-size="8">16 kHz · 16-bit PCM via Web Audio API</text>
  <text x="516" y="284" fill="#707088" font-family="monospace" font-size="8">Low-latency streaming · volume control</text>
  <text x="516" y="298" fill="#484860" font-family="monospace" font-size="8">One-click recording to WAV</text>

  <!-- Database / Events -->
  <rect x="732" y="228" width="204" height="80" rx="10" fill="#0c0c14" stroke="rgba(139,92,246,0.3)"/>
  <rect x="732" y="228" width="204" height="28" rx="10" fill="rgba(139,92,246,0.06)"/>
  <rect x="732" y="244" width="204" height="12" fill="rgba(139,92,246,0.06)"/>
  <text x="752" y="247" fill="#8b5cf6" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">💾 Event Database</text>
  <text x="752" y="270" fill="#b0b0c0" font-family="monospace" font-size="8">SQLite + aiosqlite persistence</text>
  <text x="752" y="284" fill="#707088" font-family="monospace" font-size="8">Registrations · calls · SDS messages</text>
  <text x="752" y="298" fill="#484860" font-family="monospace" font-size="8">REST API with filtering &amp; pagination</text>

  <!-- ═══ Bottom tagline ═══ -->
  <rect x="24" y="326" width="912" height="56" rx="10" fill="#0c0c14" stroke="rgba(255,255,255,0.04)"/>
  <text x="480" y="350" text-anchor="middle" fill="#f0f0f5" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Everything runs on a $80 Raspberry Pi 5 with a $25 RTL-SDR dongle</text>
  <text x="480" y="370" text-anchor="middle" fill="#707088" font-family="Inter, system-ui, sans-serif" font-size="10">GNU Radio 3.10 · Python 3.13 · FastAPI · Single-file HTML dashboard · Zero external dependencies in the browser</text>
</svg>
